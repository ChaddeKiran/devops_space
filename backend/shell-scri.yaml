apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookmycar-ingress
  namespace: prod
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: bookmycar-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bookmycar-frontend
            port:
              number: 80
              