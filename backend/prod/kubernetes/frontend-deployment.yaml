apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmycar-frontend
  namespace: prod
  labels:
    app: bookmycar-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookmycar-frontend
  template:
    metadata:
      labels:
        app: bookmycar-frontend
    spec:
      containers:
        - name: frontend
          image: bookmycar_frontend:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: bookmycar-frontend-nginx-conf
            items:
              - key: default.conf
                path: default.conf
