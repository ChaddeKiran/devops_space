apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookmycar-ingress
  namespace: bookmycar
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: bookmycar.example.com  # Replace with your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: bookmycar-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bookmycar-frontend
            port:
              number: 80