apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmycar-backend
  namespace: prod
  labels:
    app: bookmycar-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookmycar-backend
  template:
    metadata:
      labels:
        app: bookmycar-backend
    spec:
      containers:
        - name: backend
          image: chaddekiran/bookmycar_backend:v1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "150m"
              memory: "384Mi"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
          envFrom:
            - configMapRef:
                name: bookmycar-backend-config
            - secretRef:
                name: bookmycar-backend-secret
