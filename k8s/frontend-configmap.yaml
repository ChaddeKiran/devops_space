apiVersion: v1
kind: ConfigMap
metadata:
  name: bookmycar-frontend-nginx-conf
  namespace: prod
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # BookMyCar: frontend index.js rewrites localhost:8081 -> /api (see BookMyCar/frontend/src/index.js)
      # BookMyCar: backend UserController serves POST /login (no /api prefix)
      # proxy_pass trailing slash strips /api so /api/login -> backend /login
      location /api/ {
        proxy_pass http://bookmycar-backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      # SPA + rewrite baked-in localhost:8081 in JS bundles to /api
      location / {
        sub_filter 'http://localhost:8081' '/api';
        sub_filter 'localhost:8081' '/api';
        sub_filter_once off;
        sub_filter_types application/javascript text/javascript text/css application/json;
        try_files $uri $uri/ /index.html;
      }
    }
