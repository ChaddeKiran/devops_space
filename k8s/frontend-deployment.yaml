apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmycar-frontend
  namespace: prod
  labels:
    app: bookmycar-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookmycar-frontend
  template:
    metadata:
      labels:
        app: bookmycar-frontend
    spec:
      containers:
        - name: frontend
          image: chaddekiran/bookmycar_frontend:v1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: bookmycar-frontend-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: bookmycar-frontend
  namespace: prod
spec:
  selector:
    app: bookmycar-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: LoadBalancer
